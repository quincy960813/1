<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRACT HUNTER v8.7 // AI 智能交易終端</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        .tech-font { font-family: 'Share Tech Mono', monospace, 'Microsoft JhengHei'; }
    </style>
</head>
<body class="bg-[#05080E] text-gray-300 p-4 md:p-8 tech-font selection:bg-amber-500 selection:text-black">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="bg-[#0A101D] border border-gray-800 rounded p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="space-y-1">
                <div class="flex items-center space-x-2">
                    <span id="status-light" class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <h1 class="text-lg font-bold text-white tracking-widest">CONTRACT HUNTER v8.7 // AI 智能交易終端</h1>
                </div>
                <div class="flex items-center mt-2">
                    <input type="text" id="search-input" placeholder="切換幣種 (如: SOL, BTC, ETH)..." 
                           class="bg-[#0F1726] border border-gray-700 rounded-l px-3 py-1.5 text-sm font-bold text-white focus:outline-none focus:border-amber-500 w-56 uppercase">
                    <button onclick="handleSearch()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold text-xs px-4 py-2 rounded-r transition duration-150 tracking-widest cursor-pointer">
                        變更追蹤
                    </button>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-6 bg-[#0F1726] p-3 rounded border border-gray-800 w-full md:w-auto">
                <div class="space-y-1">
                    <div class="flex justify-between text-xs font-bold">
                        <span id="leverage-title" class="text-amber-400">🤖 AI 推薦動態槓桿:</span>
                        <span id="leverage-val" class="text-white font-mono text-sm">--</span>
                    </div>
                    <input type="range" id="leverage-slider" min="1" max="100" value="20" oninput="userOverrideLeverage(this.value)"
                           class="w-48 h-1.5 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-amber-500">
                    <div class="text-[9px] text-gray-500 flex justify-between">
                        <span>[低槓桿]</span>
                        <span id="ai-mode-status" class="text-emerald-500 font-bold">AI 託管中</span>
                        <span>[高槓桿]</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-[#0A101D] border border-gray-800 rounded p-4 space-y-4">
                <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">🚨 實時合約異常池</span>
                    <span id="anomaly-count" class="text-[10px] text-gray-400 bg-gray-900 px-1.5 py-0.5 rounded border border-gray-800">0 訊號</span>
                </div>
                <div id="anomaly-list" class="space-y-2 max-h-[550px] overflow-y-auto pr-1"></div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-[#0A101D] p-5 rounded border border-gray-800 space-y-5">
                    <div class="flex justify-between items-center border-b border-gray-800 pb-3">
                        <div>
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">// AI INTELLIGENT MATRIX</span>
                            <h2 id="active-ticker" class="text-2xl font-bold text-white tracking-wider">BTC-USDT-SWAP</h2>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-gray-500 font-bold block uppercase">最新成交價</span>
                            <span id="live-price" class="text-2xl font-bold text-amber-400 font-mono">--</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                        <div id="long-card" class="bg-[#081210] p-4 rounded border border-emerald-500/20 space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold text-emerald-400">🟢 AI 戰術做多點</span>
                                <span id="long-safety-badge" class="text-[10px] bg-emerald-950/80 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30 font-bold">SAFE</span>
                            </div>
                            <div class="text-2xl font-bold text-white font-mono" id="calc-long-entry">--</div>
                            <div id="long-trade-btn-container"></div>
                        </div>

                        <div id="short-card" class="bg-[#140A0C] p-4 rounded border border-red-500/20 space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold text-red-400">🔴 AI 戰術做空點</span>
                                <span id="short-safety-badge" class="text-[10px] bg-emerald-950/80 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30 font-bold">SAFE</span>
                            </div>
                            <div class="text-2xl font-bold text-white font-mono" id="calc-short-entry">--</div>
                            <div id="short-trade-btn-container"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSelectedSymbol = "BTC-USDT-SWAP";
        let isAiManagedLeverage = true;
        let leverage = 20;

        function getTradeLink(symbol) {
            let base = symbol.replace("-USDT-SWAP", "").toLowerCase();
            return `https://www.okx.com/trade-futures/${base}-usdt`;
        }

        function renderLiveMatrix(lastPrice, changePct, vol) {
            document.getElementById("live-price").innerText = '$' + lastPrice.toFixed(2);
            
            // AI 風控模擬參數
            const volatilityAlpha = 0.02;
            const long_entry = lastPrice * (1.0 - volatilityAlpha);
            const short_entry = lastPrice * (1.0 + volatilityAlpha);
            const long_liq = long_entry * 0.95; // 模擬強平價
            const short_liq = short_entry * 1.05;

            document.getElementById("calc-long-entry").innerText = '$' + long_entry.toFixed(2);
            document.getElementById("calc-short-entry").innerText = '$' + short_entry.toFixed(2);

            // 🟢 開單按鈕
            document.getElementById("long-trade-btn-container").innerHTML = `<a href="${getTradeLink(currentSelectedSymbol)}" target="_blank" class="block w-full bg-emerald-600 text-white font-bold text-center py-2 rounded text-sm hover:bg-emerald-500">前往開倉做多</a>`;
            document.getElementById("short-trade-btn-container").innerHTML = `<a href="${getTradeLink(currentSelectedSymbol)}" target="_blank" class="block w-full bg-red-600 text-white font-bold text-center py-2 rounded text-sm hover:bg-red-500">前往開倉做空</a>`;

            // 🚨 爆倉風險監控 (核心邏輯)
            const DANGER_BUFFER = 0.05; 
            const isLongDanger = (lastPrice - long_liq) / lastPrice < DANGER_BUFFER;
            const longBadge = document.getElementById("long-safety-badge");
            longBadge.innerText = isLongDanger ? "⚠️ 爆倉風險!" : "SAFE";
            longBadge.className = isLongDanger 
                ? "text-[10px] bg-red-900 text-red-400 px-2 py-0.5 rounded border border-red-500 animate-pulse font-bold" 
                : "text-[10px] bg-emerald-950/80 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30 font-bold";

            const isShortDanger = (short_liq - lastPrice) / lastPrice < DANGER_BUFFER;
            const shortBadge = document.getElementById("short-safety-badge");
            shortBadge.innerText = isShortDanger ? "⚠️ 爆倉風險!" : "SAFE";
            shortBadge.className = isShortDanger 
                ? "text-[10px] bg-red-900 text-red-400 px-2 py-0.5 rounded border border-red-500 animate-pulse font-bold" 
                : "text-[10px] bg-emerald-950/80 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30 font-bold";
        }

        async function fetchSingleTickerData() {
            try {
                const res = await fetch(`https://www.okx.com/api/v5/market/ticker?instId=${currentSelectedSymbol}`).then(r => r.json());
                if (res.data && res.data.length > 0) {
                    renderLiveMatrix(parseFloat(res.data[0].last), 0, 0);
                }
            } catch(e) {}
        }

        function handleSearch() {
            const input = document.getElementById("search-input").value.trim().toUpperCase();
            if(input) {
                currentSelectedSymbol = input.includes("-USDT-SWAP") ? input : `${input}-USDT-SWAP`;
                document.getElementById("active-ticker").innerText = currentSelectedSymbol;
                fetchSingleTickerData();
            }
        }

        function userOverrideLeverage(val) {
            leverage = val;
            document.getElementById("leverage-val").innerText = val + "x";
        }

        window.onload = () => {
            fetchSingleTickerData();
            setInterval(fetchSingleTickerData, 2000);
        };
    </script>
</body>
</html>
