<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRACT HUNTER v9.0 // AI 智能槓桿風控終端</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        .tech-font { font-family: 'Share Tech Mono', monospace, 'Microsoft JhengHei'; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #05080E; }
        ::-webkit-scrollbar-thumb { background: #2a3044; border-radius: 2px; }
        input[type=range] { -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            border: 2px solid #05080E;
            margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px; border-radius: 2px; background: #1f2937;
        }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .anim-in { animation: fadeSlideIn 0.35s ease both; }
        @keyframes flashUpdate { 0% { color: #f59e0b; } 100% { color: inherit; } }
        .flash { animation: flashUpdate 0.5s ease; }
        .badge-safe { background:#052010; color:#34d399; border:1px solid rgba(52,211,153,.25); }
        .badge-danger { background:#1a0508; color:#f87171; border:1px solid rgba(248,113,113,.6); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .chip-bar-bg { background: repeating-linear-gradient(90deg,#0f1726 0px,#0f1726 2px,transparent 2px,transparent 6px); }
    </style>
</head>
<body class="bg-[#05080E] text-gray-300 p-3 md:p-6 tech-font">

<div class="max-w-6xl mx-auto space-y-4">
    <div class="bg-[#0A101D] border border-gray-800 rounded p-3 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
        <div class="space-y-2">
            <div class="flex items-center space-x-2">
                <span id="status-light" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <h1 class="text-base font-bold text-white tracking-widest">CONTRACT HUNTER v9.0 // AI 智能槓桿風控終端</h1>
            </div>
            <div class="flex items-center">
                <input type="text" id="search-input" placeholder="切換幣種 (SOL, BTC, ETH)..."
                       class="bg-[#0F1726] border border-gray-700 rounded-l px-3 py-1.5 text-sm font-bold text-white focus:outline-none focus:border-amber-500 w-52 uppercase">
                <button onclick="handleSearch()"
                        class="bg-amber-500 hover:bg-amber-400 text-black font-bold text-xs px-4 py-2 rounded-r transition duration-150 tracking-widest cursor-pointer">
                    變更追蹤
                </button>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-5 bg-[#0F1726] p-3 rounded border border-gray-800 w-full md:w-auto">
            <div class="space-y-1">
                <div class="flex justify-between text-xs font-bold">
                    <span id="leverage-title" class="text-amber-400">🤖 AI 推薦動態槓桿:</span>
                    <span id="leverage-val" class="text-white font-mono text-sm ml-3">--</span>
                </div>
                <input type="range" id="leverage-slider" min="1" max="100" value="20" oninput="userOverrideLeverage(this.value)" class="w-44 cursor-pointer">
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div class="lg:col-span-1 bg-[#0A101D] border border-gray-800 rounded p-3 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">🚨 實時合約異常池</span>
                <span id="anomaly-count" class="text-[10px] text-gray-400 bg-gray-900 px-1.5 py-0.5 rounded border border-gray-800">0 訊號</span>
            </div>
            <div id="anomaly-list" class="space-y-1.5 max-h-[560px] overflow-y-auto pr-1"></div>
        </div>

        <div class="lg:col-span-3 space-y-4">
            <div class="bg-[#0A101D] p-4 rounded border border-gray-800 space-y-4">
                <div class="flex justify-between items-start border-b border-gray-800 pb-3">
                    <div>
                        <h2 id="active-ticker" class="text-2xl font-bold text-white tracking-wider">BTC-USDT-SWAP</h2>
                    </div>
                    <div class="text-right space-y-1">
                        <span class="text-[10px] text-gray-500 font-bold block uppercase">即時價格 (Mark Price 優先)</span>
                        <span id="live-price" class="text-xl font-bold text-amber-400 font-mono leading-tight">--</span>
                        <div class="text-[10px] mt-0.5">
                            <span id="price-change-pct" class="font-bold">--</span> 24H
                        </div>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <div class="flex justify-between text-xs font-bold">
                        <span class="text-emerald-400">🟢 AI 多頭籌碼優勢: <span id="long-pct">50%</span></span>
                        <span class="text-red-400">🔴 AI 空頭籌碼優勢: <span id="short-pct">50%</span></span>
                    </div>
                    <div class="w-full h-3 bg-gray-900 rounded-full overflow-hidden flex border border-gray-800 chip-bar-bg">
                        <div id="long-bar"  class="bg-emerald-500/80 h-full transition-all duration-300" style="width:50%"></div>
                        <div id="short-bar" class="bg-red-500/80 h-full transition-all duration-300"  style="width:50%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- [初始化設定] ---
let currentSymbol = "BTC-USDT-SWAP";
const OKX_BASE = "https://www.okx.com";
let activeProxyIdx = 0;

// --- [核心修正：同步標記價格 fetchTicker] ---
async function fetchTicker() {
    // 同時獲取成交價 (ticker) 與標記價格 (mark-price)[cite: 1]
    const [tickerRes, markRes] = await Promise.all([
        apiFetch(`/api/v5/market/ticker?instId=${currentSymbol}`),
        apiFetch(`/api/v5/market/mark-price?instId=${currentSymbol}`)
    ]);

    if (!tickerRes?.data?.[0] || !markRes?.data?.[0]) return;

    const last = parseFloat(tickerRes.data[0].last);
    const markPx = parseFloat(markRes.data[0].markPx);
    const o24h = parseFloat(tickerRes.data[0].open24h);
    
    // 將標記價格作為核心運算數據，與 OKX 合約面同步[cite: 1]
    const activePrice = markPx; 
    
    const change = o24h ? (activePrice - o24h) / o24h : 0;
    const volUsdt = parseFloat(tickerRes.data[0].volCcy24h) * activePrice;

    // UI 更新：明確標示 Last 與 Mark 價格[cite: 1]
    const priceEl = document.getElementById("live-price");
    if(priceEl) {
        priceEl.innerHTML = `<span class="text-[10px] text-gray-500">Last: $${fmt(last)}</span><br>$${fmt(activePrice)}`;
        flash("live-price");
    }

    const changePctEl = document.getElementById("price-change-pct");
    if(changePctEl) {
        changePctEl.innerText = (change >= 0 ? "+" : "") + (change * 100).toFixed(2) + "%";
        changePctEl.className = "font-bold text-sm " + (change >= 0 ? "text-emerald-400" : "text-red-400");
    }

    renderMatrix(activePrice, change, volUsdt);
}

// --- [其餘輔助函式] ---
function fmt(price) { return parseFloat(price).toLocaleString(); }
function flash(id) { const el = document.getElementById(id); if(el) el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"), 500); }
async function apiFetch(path) { 
    try { const res = await fetch(OKX_BASE + path); return await res.json(); } 
    catch(e) { return null; }
}

// 初始化
window.onload = async () => {
    await fetchTicker();
    setInterval(fetchTicker, 1500);
};
</script>
</body>
</html>
