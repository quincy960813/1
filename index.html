<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CONTRACT HUNTER v9.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#05080E] text-white p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl font-bold mb-4">Contract Hunter Status: <span id="status" class="text-amber-500">初始化中...</span></h1>
        <div id="live-price" class="text-4xl font-bold text-amber-400">$ --</div>
    </div>

<script>
// 1. 代理伺服器設定 (這是讓數據能動的關鍵)
const OKX_BASE = "https://www.okx.com";
const CORS_PROXIES = [
    "", // 直連
    "https://corsproxy.io/?", 
    "https://api.allorigins.win/raw?url="
];
let activeProxyIdx = 0;

// 2. 核心：帶有代理重試功能的 fetch
async function apiFetch(path) {
    for (let i = 0; i < CORS_PROXIES.length; i++) {
        try {
            const url = CORS_PROXIES[i] + encodeURIComponent(OKX_BASE + path);
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                if (data.code === "0") return data;
            }
        } catch (e) {
            console.warn(`代理 ${i} 失敗，嘗試下一個...`);
        }
    }
    return null;
}

// 3. 獲取數據
async function fetchTicker() {
    const symbol = "BTC-USDT-SWAP";
    const [tickerRes, markRes] = await Promise.all([
        apiFetch(`/api/v5/market/ticker?instId=${symbol}`),
        apiFetch(`/api/v5/market/mark-price?instId=${symbol}`)
    ]);

    if (!tickerRes?.data?.[0] || !markRes?.data?.[0]) {
        document.getElementById("status").innerText = "連線失敗，請檢查網路";
        return;
    }

    const markPx = parseFloat(markRes.data[0].markPx);
    document.getElementById("live-price").innerText = `$${markPx.toLocaleString()}`;
    document.getElementById("status").innerText = "即時更新中 (Mark Price)";
}

// 4. 自動執行
window.onload = async () => {
    await fetchTicker();
    setInterval(fetchTicker, 2000); // 每 2 秒刷新
};
</script>
</body>
</html>
